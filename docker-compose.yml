services:
  db:
    image: postgres:16-alpine
    container_name: compulysis-db
    environment:
      POSTGRES_DB: compulysis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compulysis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compulysis-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/compulysis_db
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-min-32-chars}
      ENVIRONMENT: development
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_ORIGIN_REGEX: ""
    ports:
      - "8000:8000"

volumes:
  postgres_data:
